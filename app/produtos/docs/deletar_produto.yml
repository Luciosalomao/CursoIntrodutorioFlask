Remove um produto do sistema. Requer autenticação.
---
tags:
  - Produtos
security:
  - Bearer: []
consumes:
  - application/json
parameters:
  - name: id
    in: path
    type: integer
    required: true
    description: ID do produto a ser removido
    example: 1
responses:
  204:
    description: Produto removido com sucesso (sem conteúdo)
  401:
    description: Não autorizado
  404:
    description: Produto não encontrado
    schema:
      type: object
      properties:
        error:
          type: string
          example: "record_not_found"
        message:
          type: string
          example: "Registro com ID 99 nao encontrado"
        resource_type:
          type: string
          example: "produto"
        requested_id:
          type: integer
          example: 99