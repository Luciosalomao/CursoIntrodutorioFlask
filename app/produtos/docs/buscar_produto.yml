Busca um produto específico pelo seu ID.
---
tags:
  - Produtos
parameters:
  - name: id
    in: path
    type: integer
    required: true
    description: ID do produto a ser buscado
    example: 1
responses:
  200:
    description: Produto encontrado com sucesso
    schema:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        preco:
          type: number
        descricao:
          type: string
  404:
    description: Produto não encontrado
    schema:
      type: object
      properties:
        error:
          type: string
          example: "record_not_found"
        message:
          type: string
          example: "Registro com ID 99 nao encontrado"
        resource_type:
          type: string
          example: "produto"
        requested_id:
          type: integer
          example: 99