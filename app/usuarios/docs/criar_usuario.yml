Cria um novo usuário (registro). Não requer autenticação.
---
tags:
  - Usuários
parameters:
  - name: body
    in: body
    required: true
    schema:
      type: object
      required:
        - nome
        - email
        - senha
      properties:
        nome:
          type: string
          example: "João Silva"
          description: Nome completo do usuário
        email:
          type: string
          example: "joao@email.com"
          description: Email único do usuário
        senha:
          type: string
          example: "senha123"
          description: Senha do usuário
responses:
  201:
    description: Usuário criado com sucesso
    schema:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        email:
          type: string
  400:
    description: Campos obrigatórios faltando
    schema:
      type: object
      properties:
        error:
          type: string
          example: "missing_fields"
        message:
          type: string
          example: "nome, email e senha sao obrigatorios"
  409:
    description: Email já cadastrado
    schema:
      type: object
      properties:
        error:
          type: string
          example: "duplicate_entry"
        message:
          type: string
          example: "Email joao@email.com ja esta cadastrado"