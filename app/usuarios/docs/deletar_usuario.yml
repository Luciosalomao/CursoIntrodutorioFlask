Remove um usuário do sistema. Requer autenticação.
---
tags:
  - Usuários
security:
  - Bearer: []
consumes:
  - application/json
parameters:
  - name: id
    in: path
    type: integer
    required: true
    description: ID do usuário a ser removido
    example: 1
responses:
  204:
    description: Usuário removido com sucesso (sem conteúdo)
  401:
    description: Não autorizado
  404:
    description: Usuário não encontrado