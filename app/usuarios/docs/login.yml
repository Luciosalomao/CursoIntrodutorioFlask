Realiza login do usuário e inicia uma sessão.
---
tags:
  - Autenticação
consumes:
  - application/json
produces:
  - application/json
parameters:
  - in: body
    name: body
    required: true
    schema:
      type: object
      required:
        - email
        - senha
      properties:
        email:
          type: string
          example: "joao@email.com"
        senha:
          type: string
          example: "senha123"
        remember:
          type: boolean
          example: true
responses:
  200:
    description: Login realizado com sucesso
    schema:
      type: object
      properties:
        message:
          type: string
        usuario:
          type: object
          properties:
            id:
              type: integer
            nome:
              type: string
            email:
              type: string
  400:
    description: Campos obrigatórios faltando
  401:
    description: Credenciais inválidas