Realiza logout do usuário atual. Requer autenticação.
---
tags:
  - Autenticação
security:
  - Bearer: []
consumes:
  - application/json
responses:
  200:
    description: Logout realizado com sucesso
    schema:
      type: object
      properties:
        message:
          type: string
          example: "Logout realizado com sucesso"
  401:
    description: Não autorizado - usuário não está logado