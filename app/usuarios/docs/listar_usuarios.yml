Lista todos os usuários cadastrados. Requer autenticação.
---
tags:
  - Usuários
security:
  - Bearer: []
consumes:
  - application/json
responses:
  200:
    description: Lista de usuários retornada com sucesso
    schema:
      type: array
      items:
        type: object
        properties:
          id:
            type: integer
            example: 1
          nome:
            type: string
            example: "João Silva"
          email:
            type: string
            example: "joao@email.com"
  401:
    description: Não autorizado - usuário não está logado