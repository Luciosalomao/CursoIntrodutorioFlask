Atualiza um usuário existente. Requer autenticação.
---
tags:
  - Usuários
security:
  - Bearer: []
consumes:
  - application/json
parameters:
  - name: id
    in: path
    type: integer
    required: true
    description: ID do usuário a ser atualizado
    example: 1
  - name: body
    in: body
    required: true
    schema:
      type: object
      properties:
        nome:
          type: string
          example: "João Silva Atualizado"
          description: Nome do usuário (opcional)
        email:
          type: string
          example: "joao.novo@email.com"
          description: Email do usuário (opcional)
        senha:
          type: string
          example: "nova_senha123"
          description: Nova senha (opcional)
responses:
  200:
    description: Usuário atualizado com sucesso
    schema:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        email:
          type: string
  400:
    description: Nenhum campo fornecido para atualização
    schema:
      type: object
      properties:
        error:
          type: string
          example: "missing_fields"
        message:
          type: string
          example: "Pelo menos um campo (nome, email ou senha) deve ser fornecido"
  401:
    description: Não autorizado
  404:
    description: Usuário não encontrado
  409:
    description: Email já cadastrado por outro usuário